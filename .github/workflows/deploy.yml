name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 192.168.127.132
          username: debruyn
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/devops-project1
            git pull
            docker-compose down
            docker-compose up -d --build
